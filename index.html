<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-list</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container d-flex align-items-center justify-content-between">
        <div class="container1" id="card">
            <h3 class="text-center text-light my-3">To Do List</h3>
            <div class="input-wrapper">
                <input type="text" name="" id="input" placeholder="   Write here..." class=" my-4 w-75 py-2 flex-grow-1"
                    style="border-radius: 30px;">
                <!-- add button -->
                <button class="btns" onclick="addtask()" title="Add"><i class="fa-solid fa-plus"></i></button>
                <!-- delete all button -->
                <button class="btns" onclick="deltask()" title="Delete All"><i class="fa-solid fa-trash"></i></button>
            </div>
            <ul id="ul">
            
        </div>
        
        </ul>
        <div class="container2 con-2-hd" id="text">
            <h2 class="con-2-hd_1 px-3"> JAVASCRIPT PROJECT</h2>
            <h1 class="con-2-hd_2 display-2 fw-bold text-light">TO-DO LIST</h1>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
